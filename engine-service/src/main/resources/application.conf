cantontrace {
  server {
    host = "0.0.0.0"
    host = ${?CANTONTRACE_HOST}
    port = 3002
    port = ${?CANTONTRACE_PORT}
  }

  engine {
    # Directory for Speedy profiler output (speedscope JSON files).
    # Only used when profiling is enabled on the sandbox.
    profile-dir = ""
    profile-dir = ${?PROFILE_DIR}

    # Maximum number of Speedy machine steps before aborting.
    # Prevents runaway evaluations.
    max-steps = 1000000

    # Maximum number of trace steps to capture.
    # Limits memory usage for complex transactions.
    max-trace-steps = 10000
  }
}

# Akka configuration
akka {
  loglevel = "INFO"
  loglevel = ${?AKKA_LOG_LEVEL}

  http {
    server {
      # Request timeout — engine evaluation can take time for complex commands
      request-timeout = 120s
      idle-timeout = 300s

      # Maximum request entity size (large DARs can be tens of MB)
      parsing {
        max-content-length = 100m
      }
    }

    client {
      idle-timeout = 60s
    }
  }

  # Use typed actor system
  actor {
    # Use the default dispatcher for computation-heavy engine work
    default-dispatcher {
      type = Dispatcher
      executor = "thread-pool-executor"
      thread-pool-executor {
        fixed-pool-size = 8
      }
      throughput = 1
    }
  }
}
